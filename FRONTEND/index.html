<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Industrial MQTT</title>

    <link rel="stylesheet" href="style.css" />

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <div class="container">
      <div class="titulo">
        <h1>Dashboard Industrial MQTT</h1>
        <p>Monitoramento em tempo real</p>
      </div>

      <div id="statusBroker" class="status offline">Offline</div>

      <div class="grid">
        <div class="card">
          <h2>Temperatura</h2>
          <div id="temperatura" class="valor">--</div>
        </div>

        <div class="card">
          <h2>Umidade</h2>
          <div id="umidade" class="valor">--</div>
        </div>

        <div class="card">
          <h2>Vibração</h2>
          <div id="vibracao" class="valor">--</div>
          <div id="statusVibracao" class="status">--</div>
        </div>

        <div class="card">
          <h2>Status Máquina</h2>
          <div id="statusMaquina" class="valor">--</div>
        </div>
      </div>

      <div class="card">
        <h2>Histórico de Temperatura</h2>
        <canvas id="chartTemp"></canvas>
      </div>

      <button id="btnEstado">Ligar</button>
    </div>

    <div id="alerta" class="alerta hidden"></div>

    <div class="footer">
      Dados recebidos via MQTT HiveMQ
      <br />
      <span id="lastUpdate">Última atualização: --</span>
    </div>

    <script src="main.js"></script>
  </body>
</html>
